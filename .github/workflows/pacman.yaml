name: Generate pacman animation

on:
  schedule:
    - cron: "* */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: generate pacman-contribution-graph.svg
        uses: abozanona/pacman-contribution-graph@b7c1f2c9f1e7c9d0c3a5f9c8d7e6a4b3c2d1e0f # contoh SHA
        with:
          github_user_name: kai-zenn

      - name: push pacman-contribution-graph.svg
        uses: crazy-max/ghaction-github-pages@6f1c3a9d8b7e5c4f2a1d0e9c8b7a6f5e4d3c2b1a # contoh SHA
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
