name: Generate pacman animation

on:
  schedule:
    - cron: "* */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: generate pacman-contribution-graph.svg
        uses: abozanona/pacman-contribution-graph@9eca7a760e7630f98079be52518346637b47c553
        with:
          github_user_name: kai-zenn

      - name: push pacman-contribution-graph.svg
        uses: crazy-max/ghaction-github-pages@d3b196049971032ad163592b87434e8079ada7ff
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
